name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge:
    name: forge build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv
