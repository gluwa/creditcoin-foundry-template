[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "forge-std/=lib/forge-std/src/",
]
via_ir = true
optimizer_runs = 200

# Creditcoin's Frontier EVM does not implement PREVRANDAO the way L1 does.
# Without this, Foundry cheatcodes that touch prevrandao fail against CC3.
bypass_prevrandao = true

[rpc_endpoints]
cc3-devnet = "https://rpc.cc3-devnet.creditcoin.network"
# Local CC3 node in --dev mode serves HTTP and WS on the same port.
cc3-local = "http://127.0.0.1:9944"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
